<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Déclarer mes compétences — Promo IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f7f6f2;
  --surface:  #ffffff;
  --border:   #e2e0d8;
  --text:     #1a1917;
  --muted:    #888780;
  --accent:   #534AB7;
  --accent-l: #EEEDFE;
  --accent-t: #3C3489;
  --success:  #0F6E56;
  --success-l:#E1F5EE;
  --danger:   #993C1D;
  --danger-l: #FAECE7;
  --sans:     'Syne', sans-serif;
  --mono:     'DM Mono', monospace;
  --r:        10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); min-height: 100%; }
body { font-family: var(--sans); color: var(--text); padding: 2rem 1rem 4rem; }

.page { max-width: 580px; margin: 0 auto; }

header { margin-bottom: 2.5rem; }
header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
header p  { font-size: 13px; color: var(--muted); font-family: var(--mono); line-height: 1.6; }

/* ── Bloc compétence ── */
.skill-block {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
  position: relative;
}
.skill-block.optional { opacity: 0.7; transition: opacity 0.2s; }
.skill-block.optional:focus-within,
.skill-block.optional:hover { opacity: 1; }

.block-label {
  font-size: 11px; font-weight: 500; font-family: var(--mono);
  color: var(--muted); letter-spacing: 0.06em;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.block-label .opt-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  background: var(--bg); color: var(--muted);
  border: 0.5px solid var(--border);
}

.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--muted); margin-bottom: 5px; font-family: var(--mono);
}

/* Autocomplete wrapper */
.ac-wrap { position: relative; }
.ac-input {
  width: 100%; padding: 9px 12px;
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  border: 0.5px solid var(--border); border-radius: var(--r);
  background: var(--bg); color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.ac-input:focus { border-color: var(--accent); background: var(--surface); }
.ac-input::placeholder { color: var(--muted); font-weight: 400; }

.ac-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--r); z-index: 100;
  max-height: 200px; overflow-y: auto;
  display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.ac-dropdown.open { display: block; }
.ac-option {
  padding: 9px 12px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.1s;
}
.ac-option:hover, .ac-option.active { background: var(--accent-l); }
.ac-option .new-tag {
  font-size: 10px; font-family: var(--mono); padding: 1px 6px;
  border-radius: 4px; background: var(--accent-l); color: var(--accent-t);
}
.ac-option .count-tag {
  font-size: 10px; font-family: var(--mono); color: var(--muted);
}

/* Niveau radio */
.level-row { display: flex; gap: 8px; }
.level-btn {
  flex: 1; padding: 8px 4px; text-align: center;
  border: 0.5px solid var(--border); border-radius: var(--r);
  cursor: pointer; transition: all 0.15s; font-size: 12px;
  font-family: var(--mono); background: var(--bg); color: var(--muted);
  user-select: none;
}
.level-btn:hover { border-color: var(--accent); color: var(--accent); }
.level-btn.selected {
  background: var(--accent-l); border-color: var(--accent);
  color: var(--accent-t); font-weight: 500;
}
.level-btn .lvl-num { display: block; font-size: 18px; font-weight: 700; margin-bottom: 2px; }
.level-btn .lvl-lbl { display: block; font-size: 10px; }

/* Champ prénom */
.field-top {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 14px; padding: 20px; margin-bottom: 12px;
}
.field-top input {
  width: 100%; padding: 9px 12px;
  font-family: var(--sans); font-size: 16px; font-weight: 700;
  border: 0.5px solid var(--border); border-radius: var(--r);
  background: var(--bg); color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.field-top input:focus { border-color: var(--accent); background: var(--surface); }
.field-top input::placeholder { font-weight: 400; color: var(--muted); }

/* Bouton submit */
#btn-submit {
  width: 100%; margin-top: 8px; padding: 14px;
  font-family: var(--sans); font-size: 15px; font-weight: 700;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r); cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
#btn-submit:hover   { opacity: 0.88; }
#btn-submit:active  { transform: scale(0.98); }
#btn-submit:disabled{ opacity: 0.4; cursor: default; }

/* Feedback */
#feedback {
  margin-top: 12px; padding: 12px 16px; border-radius: var(--r);
  font-family: var(--mono); font-size: 13px; display: none;
}
#feedback.success { background: var(--success-l); color: var(--success); }
#feedback.error   { background: var(--danger-l);  color: var(--danger); }

/* Compteur */
#skills-seen {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  margin-bottom: 20px; padding: 8px 12px; background: var(--surface);
  border: 0.5px solid var(--border); border-radius: var(--r);
  display: none;
}
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>Mes compétences</h1>
    <p>Promo Chef de projet IA · Déclarez jusqu'à 5 compétences.<br>
    Les listes s'enrichissent au fil des réponses — choisissez ou créez librement.</p>
  </header>

  <div id="skills-seen"></div>

  <!-- Prénom -->
  <div class="field-top">
    <div class="field">
      <label>Prénom *</label>
      <input id="prenom" type="text" placeholder="ex : Alice" autocomplete="given-name">
    </div>
  </div>

  <!-- Blocs compétences 1-5 -->
  <div id="blocks-container"></div>

  <button id="btn-submit" onclick="submitForm()">Enregistrer mes compétences</button>
  <div id="feedback"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ══════════════════════════════════════════════════════
// CONFIG — remplacer par vos valeurs
// ══════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://rhqcbghgekqforxhoeip.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJocWNiZ2hnZWtxZm9yeGhvZWlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODAyNTAsImV4cCI6MjA5MTE1NjI1MH0.vjXf-taDKUQKCcMMC5j9riKYpzV96P4KWVGFJfgHd8g';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Données chargées depuis Supabase ──────────────────
let allCategories = [];   // [{ id, name }]
let allSkills     = [];   // [{ id, name, category_id, declarers_count }]

async function loadLists() {
  const [catRes, skillRes] = await Promise.all([
    sb.from('categories').select('id, name').order('name'),
    sb.from('skill_cloud_view').select('id, name, category_id, declarers_count').order('name'),
  ]);
  allCategories = catRes.data  || [];
  allSkills     = skillRes.data || [];

  const seen = document.getElementById('skills-seen');
  if (allSkills.length > 0) {
    seen.style.display = 'block';
    seen.textContent =
      `${allSkills.length} compétence${allSkills.length > 1 ? 's' : ''} déjà déclarée${allSkills.length > 1 ? 's' : ''} · ` +
      `${allCategories.length} catégorie${allCategories.length > 1 ? 's' : ''}`;
  }
}

// ── Autocomplete générique ────────────────────────────
function makeAutocomplete(input, dropdown, getItems, onSelect) {
  let activeIdx = -1;

  function filter(q) {
    const lower = q.toLowerCase().trim();
    const items = getItems();
    if (!lower) return items.slice(0, 12);
    const matches = items.filter(i => i.name.toLowerCase().includes(lower));
    // Si pas de correspondance exacte, proposer "Créer X"
    const exact = items.find(i => i.name.toLowerCase() === lower);
    if (!exact && lower.length > 1) {
      matches.push({ id: null, name: q, isNew: true });
    }
    return matches.slice(0, 12);
  }

  function render(q) {
    const items = filter(q);
    if (!items.length) { dropdown.classList.remove('open'); return; }
    activeIdx = -1;
    dropdown.innerHTML = items.map((item, i) => `
      <div class="ac-option" data-idx="${i}" data-id="${item.id || ''}" data-name="${item.name}">
        <span>${item.name}</span>
        ${item.isNew
          ? `<span class="new-tag">+ créer</span>`
          : item.count != null
            ? `<span class="count-tag">${item.count}×</span>`
            : ''}
      </div>`).join('');
    dropdown.querySelectorAll('.ac-option').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        const name = el.dataset.name;
        const id   = el.dataset.id || null;
        input.value = name;
        onSelect({ id, name, isNew: !id });
        dropdown.classList.remove('open');
      });
    });
    dropdown.classList.add('open');
  }

  input.addEventListener('input', () => {
    render(input.value);
    onSelect({ id: null, name: input.value, isNew: true }); // reset selection
  });
  input.addEventListener('focus', () => render(input.value));
  input.addEventListener('blur',  () => setTimeout(() => dropdown.classList.remove('open'), 150));
  input.addEventListener('keydown', e => {
    const opts = dropdown.querySelectorAll('.ac-option');
    if (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx+1, opts.length-1); }
    else if (e.key === 'ArrowUp') { activeIdx = Math.max(activeIdx-1, 0); }
    else if (e.key === 'Enter' && activeIdx >= 0) {
      e.preventDefault(); opts[activeIdx].dispatchEvent(new MouseEvent('mousedown'));
    }
    else if (e.key === 'Escape') { dropdown.classList.remove('open'); }
    opts.forEach((o,i) => o.classList.toggle('active', i === activeIdx));
  });
}

// ── Construction des blocs ────────────────────────────
const EXEMPLES = [
  { cat: 'Ingénierie IA & LLMs',         comp: 'Prompt engineering' },
  { cat: 'Pilotage de projet IA',         comp: 'Gestion de projet' },
  { cat: 'Data & Analytics',              comp: 'Excel / Google Sheets' },
  { cat: 'Méthodologie & cadrage',        comp: 'Conduite du changement' },
  { cat: 'Ops, support & automatisation', comp: 'Amélioration continue' },
];

// État de chaque bloc
const state = Array.from({ length: 5 }, () => ({
  catId: null, catName: '', catIsNew: false,
  skillName: '', level: null,
}));

function buildBlocks() {
  const container = document.getElementById('blocks-container');
  container.innerHTML = '';

  for (let i = 0; i < 5; i++) {
    const ex  = EXEMPLES[i];
    const num = i + 1;
    const optional = i > 0;

    const block = document.createElement('div');
    block.className = `skill-block${optional ? ' optional' : ''}`;
    block.id = `block-${i}`;
    block.innerHTML = `
      <div class="block-label">
        Compétence ${num}
        ${optional ? '<span class="opt-tag">optionnelle</span>' : ''}
      </div>

      <div class="field">
        <label>Catégorie</label>
        <div class="ac-wrap">
          <input class="ac-input" id="cat-input-${i}"
            placeholder="ex : ${ex.cat}" autocomplete="off">
          <div class="ac-dropdown" id="cat-drop-${i}"></div>
        </div>
      </div>

      <div class="field">
        <label>Compétence</label>
        <div class="ac-wrap">
          <input class="ac-input" id="skill-input-${i}"
            placeholder="ex : ${ex.comp}" autocomplete="off">
          <div class="ac-dropdown" id="skill-drop-${i}"></div>
        </div>
      </div>

      <div class="field">
        <label>Niveau</label>
        <div class="level-row" id="level-row-${i}">
          ${[
            ['1','Découverte','notions'],
            ['2','Pratique','expérience'],
            ['3','Expert','peut animer'],
          ].map(([n,l,s]) => `
            <div class="level-btn" data-block="${i}" data-level="${n}" onclick="selectLevel(${i},${n})">
              <span class="lvl-num">${n}</span>
              <span class="lvl-lbl">${l}</span>
            </div>`).join('')}
        </div>
      </div>`;

    container.appendChild(block);

    // Autocomplete catégorie
    const catInput = document.getElementById(`cat-input-${i}`);
    const catDrop  = document.getElementById(`cat-drop-${i}`);
    makeAutocomplete(
      catInput, catDrop,
      () => allCategories.map(c => ({ id: c.id, name: c.name })),
      (sel) => { state[i].catId = sel.id; state[i].catName = sel.name; state[i].catIsNew = sel.isNew; }
    );

    // Autocomplete compétence — filtrée par catégorie si choisie
    const skillInput = document.getElementById(`skill-input-${i}`);
    const skillDrop  = document.getElementById(`skill-drop-${i}`);
    makeAutocomplete(
      skillInput, skillDrop,
      () => {
        let pool = allSkills;
        if (state[i].catId) {
          pool = allSkills.filter(s => s.category_id === state[i].catId);
        }
        return pool.map(s => ({ id: s.id, name: s.name, count: s.declarers_count }));
      },
      (sel) => { state[i].skillName = sel.name; }
    );
  }
}

function selectLevel(blockIdx, level) {
  state[blockIdx].level = level;
  document.querySelectorAll(`#level-row-${blockIdx} .level-btn`).forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.level) === level);
  });
}

// ── Soumission ────────────────────────────────────────
async function submitForm() {
  const prenom = document.getElementById('prenom').value.trim();
  if (!prenom) { showFeedback('Veuillez saisir votre prénom.', 'error'); return; }

  const rows = [];
  for (let i = 0; i < 5; i++) {
    const s = state[i];
    const skillName = document.getElementById(`skill-input-${i}`).value.trim();
    const catName   = document.getElementById(`cat-input-${i}`).value.trim();
    if (!skillName) { if (i === 0) { showFeedback('La compétence 1 est obligatoire.', 'error'); return; } continue; }
    if (!s.level)   { showFeedback(`Choisissez un niveau pour la compétence ${i+1}.`, 'error'); return; }
    rows.push({ catName, skillName, level: s.level, catIsNew: !s.catId && !!catName });
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';

  // Palette tournante — chaque nouvelle catégorie reçoit une couleur unique
  const PALETTE = [
    '#534AB7','#0F6E56','#993C1D','#185FA5',
    '#854F0B','#993556','#3B6D11','#D85A30',
    '#3C3489','#1D9E75','#712B13','#378ADD',
  ];
  function nextCatColor() {
    return PALETTE[allCategories.length % PALETTE.length];
  }

  try {
    for (const row of rows) {
      // 1. Upsert catégorie
      let categoryId = null;
      if (row.catName) {
        const { data: existCat } = await sb
          .from('categories')
          .select('id')
          .ilike('name', row.catName)
          .maybeSingle();

        if (existCat) {
          categoryId = existCat.id;
        } else {
          const color = nextCatColor();
          const { data: newCat } = await sb
            .from('categories')
            .insert({ name: row.catName, color_hex: color })
            .select('id')
            .single();
          categoryId = newCat?.id;
          // Mise à jour locale immédiate
          if (newCat) allCategories.push({ id: newCat.id, name: row.catName, color_hex: color });
        }
      }

      // 2. Upsert compétence
      const { data: existSkill } = await sb
        .from('skills')
        .select('id')
        .ilike('name', row.skillName)
        .maybeSingle();

      let skillId;
      if (existSkill) {
        skillId = existSkill.id;
      } else {
        const { data: newSkill } = await sb
          .from('skills')
          .insert({ name: row.skillName, category_id: categoryId })
          .select('id')
          .single();
        skillId = newSkill?.id;
        if (newSkill) allSkills.push({ id: newSkill.id, name: row.skillName, category_id: categoryId, declarers_count: 0 });
      }

      // 3. Upsert déclaration
      if (skillId) {
        await sb.from('declarations').upsert(
          { participant: prenom, skill_id: skillId, level: row.level },
          { onConflict: 'participant,skill_id' }
        );
      }
    }

    showFeedback(`Merci ${prenom} ! Vos compétences sont enregistrées. Le nuage se met à jour.`, 'success');
    btn.textContent = 'Enregistré ✓';

    // Reset après 3s
    setTimeout(() => {
      document.getElementById('prenom').value = '';
      state.forEach((s, i) => {
        s.catId = null; s.catName = ''; s.skillName = ''; s.level = null;
        document.getElementById(`cat-input-${i}`).value = '';
        document.getElementById(`skill-input-${i}`).value = '';
        document.querySelectorAll(`#level-row-${i} .level-btn`).forEach(b => b.classList.remove('selected'));
      });
      btn.disabled = false;
      btn.textContent = 'Enregistrer mes compétences';
      loadLists(); // rafraîchir les listes
    }, 3000);

  } catch (err) {
    console.error(err);
    showFeedback('Erreur lors de l\'enregistrement. Réessayez.', 'error');
    btn.disabled = false;
    btn.textContent = 'Enregistrer mes compétences';
  }
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

// ── Init ──────────────────────────────────────────────
(async () => {
  await loadLists();
  buildBlocks();
})();
</script>
</body>
</html>
