<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Déclarer mes compétences — Promo IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f7f6f2;
  --surface:  #ffffff;
  --border:   #e2e0d8;
  --text:     #1a1917;
  --muted:    #888780;
  --accent:   #534AB7;
  --accent-l: #EEEDFE;
  --accent-t: #3C3489;
  --success:  #0F6E56;
  --success-l:#E1F5EE;
  --danger:   #993C1D;
  --danger-l: #FAECE7;
  --sans:     'Syne', sans-serif;
  --mono:     'DM Mono', monospace;
  --r:        10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); min-height: 100%; }
body { font-family: var(--sans); color: var(--text); padding: 2rem 1rem 4rem; }

.page { max-width: 580px; margin: 0 auto; }

header { margin-bottom: 2.5rem; }
header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
header p  { font-size: 13px; color: var(--muted); font-family: var(--mono); line-height: 1.6; }

/* ── Bloc compétence ── */
.skill-block {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
  position: relative;
}
.skill-block.optional { opacity: 0.7; transition: opacity 0.2s; }
.skill-block.optional:focus-within,
.skill-block.optional:hover { opacity: 1; }

.block-label {
  font-size: 11px; font-weight: 500; font-family: var(--mono);
  color: var(--muted); letter-spacing: 0.06em;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.block-label .opt-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  background: var(--bg); color: var(--muted);
  border: 0.5px solid var(--border);
}

.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--muted); margin-bottom: 5px; font-family: var(--mono);
}

/* Autocomplete wrapper */
.ac-wrap { position: relative; }
.ac-input {
  width: 100%; padding: 9px 12px;
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  border: 0.5px solid var(--border); border-radius: var(--r);
  background: var(--bg); color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.ac-input:focus { border-color: var(--accent); background: var(--surface); }
.ac-input::placeholder { color: var(--muted); font-weight: 400; }
.ac-input.auto-filled { background: var(--success-l); border-color: #9FE1CB; color: var(--success); }
.ac-input.auto-filled:focus { border-color: var(--success); }

.ac-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--r); z-index: 100;
  max-height: 200px; overflow-y: auto;
  display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.ac-dropdown.open { display: block; }
.ac-option {
  padding: 9px 12px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.1s;
}
.ac-option:hover, .ac-option.active { background: var(--accent-l); }
.ac-option .new-tag {
  font-size: 10px; font-family: var(--mono); padding: 1px 6px;
  border-radius: 4px; background: var(--accent-l); color: var(--accent-t);
}
.ac-option .count-tag {
  font-size: 10px; font-family: var(--mono); color: var(--muted);
}

/* Niveau radio */
.level-row { display: flex; gap: 8px; }
.level-btn {
  flex: 1; padding: 8px 4px; text-align: center;
  border: 0.5px solid var(--border); border-radius: var(--r);
  cursor: pointer; transition: all 0.15s; font-size: 12px;
  font-family: var(--mono); background: var(--bg); color: var(--muted);
  user-select: none;
}
.level-btn:hover { border-color: var(--accent); color: var(--accent); }
.level-btn.selected {
  background: var(--accent-l); border-color: var(--accent);
  color: var(--accent-t); font-weight: 500;
}
.level-btn .lvl-num { display: block; font-size: 18px; font-weight: 700; margin-bottom: 2px; }
.level-btn .lvl-lbl { display: block; font-size: 10px; }

/* Champ prénom */
.field-top {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 14px; padding: 20px; margin-bottom: 12px;
}
.field-top input {
  width: 100%; padding: 9px 12px;
  font-family: var(--sans); font-size: 15px; font-weight: 700;
  border: 0.5px solid var(--border); border-radius: var(--r);
  background: var(--bg); color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.field-top input:focus { border-color: var(--accent); background: var(--surface); }
.field-top input::placeholder { font-weight: 400; color: var(--muted); }
/* Le champ prénom est un ac-input dans un field-top — on s'assure que le dropdown passe dessus */
.field-top .ac-dropdown { z-index: 200; }

/* Bouton submit */
#btn-submit {
  width: 100%; margin-top: 8px; padding: 14px;
  font-family: var(--sans); font-size: 15px; font-weight: 700;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r); cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
#btn-submit:hover   { opacity: 0.88; }
#btn-submit:active  { transform: scale(0.98); }
#btn-submit:disabled{ opacity: 0.4; cursor: default; }

/* Feedback */
#feedback {
  margin-top: 12px; padding: 12px 16px; border-radius: var(--r);
  font-family: var(--mono); font-size: 13px; display: none;
}
#feedback.success { background: var(--success-l); color: var(--success); }
#feedback.error   { background: var(--danger-l);  color: var(--danger); }

/* ── Layout desktop : form + panneau latéral ── */
.layout { display: flex; gap: 24px; align-items: flex-start; max-width: 960px; margin: 0 auto; }
.form-col { flex: 1; min-width: 0; max-width: 580px; }
.side-col { width: 240px; flex-shrink: 0; position: sticky; top: 24px; }
@media (max-width: 860px) { .layout { flex-direction: column; } .side-col { width: 100%; position: static; } }

/* Panneau historique prénom */
#history-panel {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 14px; padding: 16px; display: none;
}
#history-panel h3 { font-size: 13px; font-weight: 500; margin-bottom: 12px; }
.hist-item { padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
.hist-item:last-child { border-bottom: none; }
.hist-skill { font-weight: 500; color: var(--text); }
.hist-cat   { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
.hist-lvl   { font-family: var(--mono); font-size: 10px; margin-top: 2px; }
.hist-lvl-1 { color: #85B7EB; } .hist-lvl-2 { color: #EF9F27; } .hist-lvl-3 { color: #0F6E56; }

/* Alerte doublon sur champ compétence */
.ac-input.duplicate { border-color: var(--danger); background: var(--danger-l); }
.dup-hint { font-family: var(--mono); font-size: 10px; color: var(--danger); margin-top: 4px; display: none; }
.dup-hint.visible { display: block; }

/* Autocomplete prénom */
#prenom-wrap { position: relative; }

/* Compteur */
#skills-seen {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  margin-bottom: 20px; padding: 8px 12px; background: var(--surface);
  border: 0.5px solid var(--border); border-radius: var(--r);
  display: none;
}
</style>
</head>
<body>
<div class="layout">
  <div class="form-col">

    <header>
      <h1>Mes compétences</h1>
      <p>Promo Chef de projet IA · Déclarez jusqu'à 5 compétences.<br>
      Les listes s'enrichissent au fil des réponses — choisissez ou créez librement.</p>
    </header>

    <div id="skills-seen"></div>

    <!-- Prénom avec autocomplete -->
    <div class="field-top">
      <div class="field">
        <label>Prénom *</label>
        <div id="prenom-wrap" class="ac-wrap">
          <input id="prenom" class="ac-input" type="text" placeholder="ex : Alice" autocomplete="off">
          <div id="prenom-drop" class="ac-dropdown"></div>
        </div>
      </div>
    </div>

    <!-- Blocs compétences 1-5 -->
    <div id="blocks-container"></div>

    <button id="btn-submit" onclick="submitForm()">Enregistrer mes compétences</button>
    <div id="feedback"></div>

  </div>

  <!-- Panneau latéral historique -->
  <div class="side-col">
    <div id="history-panel">
      <h3 id="history-title">Compétences déjà saisies</h3>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<script>

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Données chargées depuis Supabase ──────────────────
let allCategories   = [];  // [{ id, name }]
let allSkills       = [];  // [{ id, name, category_id, declarers_count }]
let allPrenoms      = [];  // prénoms distincts déjà utilisés
let prenomDeclMap   = {};  // { prenom: [{ skill_id, skill_name, cat_name, level }] }

async function loadLists() {
  const [catRes, skillRes, declRes] = await Promise.all([
    sb.from('categories').select('id, name').order('name'),
    sb.from('skill_cloud_view').select('id, name, category_id, declarers_count').order('name'),
    sb.from('declarations').select('participant, skill_id, level'),
  ]);
  allCategories = catRes.data  || [];
  allSkills     = skillRes.data || [];

  // Construire la map prénom → déclarations
  prenomDeclMap = {};
  (declRes.data || []).forEach(d => {
    if (!prenomDeclMap[d.participant]) prenomDeclMap[d.participant] = [];
    const skill = (skillRes.data || []).find(s => s.id === d.skill_id);
    const cat   = skill ? allCategories.find(c => c.id === skill.category_id) : null;
    prenomDeclMap[d.participant].push({
      skill_id:   d.skill_id,
      skill_name: skill ? skill.name : '(compétence inconnue)',
      cat_name:   cat ? cat.name : '—',
      level:      d.level,
    });
  });
  // allPrenoms inclut aussi les prénoms sans déclarations connues
  // (cas impossible normalement, mais on sécurise)
  allPrenoms = Object.keys(prenomDeclMap).sort();
  console.log('[SkillCloud] Prénoms chargés:', allPrenoms.length, allPrenoms);

  const seen = document.getElementById('skills-seen');
  if (allSkills.length > 0) {

    seen.textContent =
      `${allSkills.length} compétence${allSkills.length > 1 ? 's' : ''} déjà déclarée${allSkills.length > 1 ? 's' : ''} · ` +
      `${allCategories.length} catégorie${allCategories.length > 1 ? 's' : ''}`;
  }
}

// ── Autocomplete générique ────────────────────────────
function makeAutocomplete(input, dropdown, getItems, onSelect) {
  let activeIdx = -1;

  function filter(q) {
    const lower = q.toLowerCase().trim();
    const items = getItems();
    if (!lower) return items.slice(0, 12);
    const matches = items.filter(i => i.name.toLowerCase().includes(lower));
    // Si pas de correspondance exacte, proposer "Créer X"
    const exact = items.find(i => i.name.toLowerCase() === lower);
    if (!exact && lower.length > 1) {
      matches.push({ id: null, name: q, isNew: true });
    }
    return matches.slice(0, 12);
  }

  function render(q) {
    const items = filter(q);
    if (!items.length) { dropdown.classList.remove('open'); return; }
    activeIdx = -1;
    dropdown.innerHTML = items.map((item, i) => `
      <div class="ac-option" data-idx="${i}" data-id="${item.id || ''}" data-name="${item.name}">
        <span>${item.name}</span>
        ${item.isNew
          ? `<span class="new-tag">+ créer</span>`
          : item.count != null
            ? `<span class="count-tag">${item.count}×</span>`
            : ''}
      </div>`).join('');
    dropdown.querySelectorAll('.ac-option').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        const name = el.dataset.name;
        const id   = el.dataset.id || null;
        input.value = name;
        onSelect({ id, name, isNew: !id });
        dropdown.classList.remove('open');
      });
    });
    dropdown.classList.add('open');
  }

  input.addEventListener('input', () => {
    render(input.value);
    onSelect({ id: null, name: input.value, isNew: true }); // reset selection
  });
  input.addEventListener('focus', () => render(input.value));
  input.addEventListener('blur',  () => setTimeout(() => dropdown.classList.remove('open'), 150));
  input.addEventListener('keydown', e => {
    const opts = dropdown.querySelectorAll('.ac-option');
    if (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx+1, opts.length-1); }
    else if (e.key === 'ArrowUp') { activeIdx = Math.max(activeIdx-1, 0); }
    else if (e.key === 'Enter' && activeIdx >= 0) {
      e.preventDefault(); opts[activeIdx].dispatchEvent(new MouseEvent('mousedown'));
    }
    else if (e.key === 'Escape') { dropdown.classList.remove('open'); }
    opts.forEach((o,i) => o.classList.toggle('active', i === activeIdx));
  });
}

// ── Construction des blocs ────────────────────────────
const EXEMPLES = [
  { cat: 'Ingénierie IA & LLMs',         comp: 'Prompt engineering' },
  { cat: 'Pilotage de projet IA',         comp: 'Gestion de projet' },
  { cat: 'Data & Analytics',              comp: 'Excel / Google Sheets' },
  { cat: 'Méthodologie & cadrage',        comp: 'Conduite du changement' },
  { cat: 'Ops, support & automatisation', comp: 'Amélioration continue' },
];

// État de chaque bloc
const state = Array.from({ length: 5 }, () => ({
  catId: null, catName: '', catIsNew: false,
  skillName: '', level: null,
}));

function buildBlocks() {
  const container = document.getElementById('blocks-container');
  container.innerHTML = '';

  for (let i = 0; i < 5; i++) {
    const ex  = EXEMPLES[i];
    const num = i + 1;
    const optional = i > 0;

    const block = document.createElement('div');
    block.className = `skill-block${optional ? ' optional' : ''}`;
    block.id = `block-${i}`;
    block.innerHTML = `
      <div class="block-label">
        Compétence ${num}
        ${optional ? '<span class="opt-tag">optionnelle</span>' : ''}
      </div>

      <div class="field">
        <label>Catégorie</label>
        <div class="ac-wrap">
          <input class="ac-input" id="cat-input-${i}"
            placeholder="ex : ${ex.cat}" autocomplete="off">
          <div class="ac-dropdown" id="cat-drop-${i}"></div>
        </div>
      </div>

      <div class="field">
        <label>Compétence</label>
        <div class="ac-wrap">
          <input class="ac-input" id="skill-input-${i}"
            placeholder="ex : ${ex.comp}" autocomplete="off">
          <div class="ac-dropdown" id="skill-drop-${i}"></div>
        </div>
        <div class="dup-hint" id="dup-hint-${i}">⚠ Déjà déclarée par ce prénom</div>
      </div>

      <div class="field">
        <label>Niveau</label>
        <div class="level-row" id="level-row-${i}">
          ${[
            ['1','Découverte','notions'],
            ['2','Pratique','expérience'],
            ['3','Expert','peut animer'],
          ].map(([n,l,s]) => `
            <div class="level-btn" data-block="${i}" data-level="${n}" onclick="selectLevel(${i},${n})">
              <span class="lvl-num">${n}</span>
              <span class="lvl-lbl">${l}</span>
            </div>`).join('')}
        </div>
      </div>`;

    container.appendChild(block);

    // Autocomplete catégorie
    const catInput = document.getElementById(`cat-input-${i}`);
    const catDrop  = document.getElementById(`cat-drop-${i}`);
    makeAutocomplete(
      catInput, catDrop,
      () => {
        // Si des catégories ont été filtrées par le choix de compétence, les utiliser
        const pool = catInput._filteredCats || allCategories;
        return pool.map(c => ({ id: c.id, name: c.name }));
      },
      (sel) => {
        catInput._filteredCats = null; // réinitialiser le filtre après sélection
        catInput.placeholder = `ex : ${EXEMPLES[i]?.cat || 'Catégorie'}`;
        state[i].catId    = sel.id;
        state[i].catName  = sel.name;
        state[i].catIsNew = sel.isNew;
        state[i]._autoFilled = false;
        catInput.classList.remove('auto-filled');
      }
    );

    // Autocomplete compétence — filtrée par catégorie si choisie
    const skillInput = document.getElementById(`skill-input-${i}`);
    const skillDrop  = document.getElementById(`skill-drop-${i}`);
    makeAutocomplete(
      skillInput, skillDrop,
      () => {
        let pool = allSkills;
        if (state[i].catId) {
          pool = allSkills.filter(s => s.category_id === state[i].catId);
        }
        return pool.map(s => ({ id: s.id, name: s.name, count: s.declarers_count }));
      },
      (sel) => {
        state[i].skillName = sel.name;
        // Remplissage auto de la catégorie si compétence existante
        if (sel.id && !state[i].catId) {
          autofillCategory(i, sel.name);
        }
        // Si la compétence change (frappe libre), réinitialiser l'auto-fill
        if (!sel.id) {
          clearAutofilledCat(i);
        }
        // Vérifier doublon
        checkDuplicate(i);
      }
    );
  }
}

// Remplit automatiquement la catégorie quand la compétence est sélectionnée
function autofillCategory(blockIdx, skillName) {
  const matches = allSkills.filter(
    s => s.name.toLowerCase() === skillName.toLowerCase()
  );
  if (!matches.length) return;

  const catInput = document.getElementById(`cat-input-${blockIdx}`);

  // Trouver les catégories uniques associées
  const catIds = [...new Set(matches.map(s => s.category_id))];

  if (catIds.length === 1) {
    // Cas unique — remplir et verrouiller visuellement
    const cat = allCategories.find(c => c.id === catIds[0]);
    if (!cat) return;
    catInput.value = cat.name;
    catInput.classList.add('auto-filled');
    catInput.title = 'Catégorie détectée automatiquement';
    state[blockIdx].catId   = cat.id;
    state[blockIdx].catName = cat.name;
    state[blockIdx].catIsNew = false;
    state[blockIdx]._autoFilled = true;
  } else {
    // Cas multiple — filtrer la liste des catégories
    // L'utilisateur devra choisir parmi les catégories associées
    const validCats = allCategories.filter(c => catIds.includes(c.id));
    catInput.placeholder = 'Plusieurs catégories possibles — choisissez';
    // Déclencher un focus pour montrer les options filtrées
    const catDrop = document.getElementById(`cat-drop-${blockIdx}`);
    // Remplacer temporairement getItems pour ce bloc
    catInput._filteredCats = validCats;
    catInput.focus();
  }
}

function clearAutofilledCat(blockIdx) {
  if (!state[blockIdx]._autoFilled) return;
  const catInput = document.getElementById(`cat-input-${blockIdx}`);
  catInput.value = '';
  catInput.classList.remove('auto-filled');
  catInput.title = '';
  catInput.placeholder = `ex : ${EXEMPLES[blockIdx]?.cat || 'Catégorie'}`;
  state[blockIdx].catId   = null;
  state[blockIdx].catName = '';
  state[blockIdx].catIsNew = false;
  state[blockIdx]._autoFilled = false;
}

function selectLevel(blockIdx, level) {
  state[blockIdx].level = level;
  document.querySelectorAll(`#level-row-${blockIdx} .level-btn`).forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.level) === level);
  });
}

// ── Soumission ────────────────────────────────────────
async function submitForm() {
  const prenom = document.getElementById('prenom').value.trim();
  if (!prenom) { showFeedback('Veuillez saisir votre prénom.', 'error'); return; }

  // Vérifier doublons avant soumission
  checkAllDuplicates(prenom);
  const hasDup = document.querySelector('.ac-input.duplicate');
  if (hasDup) { showFeedback('Une compétence est déjà déclarée par ce prénom — corrigez avant d\'envoyer.', 'error'); return; }

  const rows = [];
  for (let i = 0; i < 5; i++) {
    const s = state[i];
    const skillName = document.getElementById(`skill-input-${i}`).value.trim();
    const catName   = document.getElementById(`cat-input-${i}`).value.trim();
    if (!skillName) { if (i === 0) { showFeedback('La compétence 1 est obligatoire.', 'error'); return; } continue; }
    if (!s.level)   { showFeedback(`Choisissez un niveau pour la compétence ${i+1}.`, 'error'); return; }
    rows.push({ catName, skillName, level: s.level, catIsNew: !s.catId && !!catName });
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';

  // Palette tournante — chaque nouvelle catégorie reçoit une couleur unique
  const PALETTE = [
    '#534AB7','#0F6E56','#993C1D','#185FA5',
    '#854F0B','#993556','#3B6D11','#D85A30',
    '#3C3489','#1D9E75','#712B13','#378ADD',
  ];
  function nextCatColor() {
    return PALETTE[allCategories.length % PALETTE.length];
  }

  try {
    for (const row of rows) {
      // 1. Upsert catégorie
      let categoryId = null;
      if (row.catName) {
        const { data: existCat } = await sb
          .from('categories')
          .select('id')
          .ilike('name', row.catName)
          .maybeSingle();

        if (existCat) {
          categoryId = existCat.id;
        } else {
          const color = nextCatColor();
          const { data: newCat } = await sb
            .from('categories')
            .insert({ name: row.catName, color_hex: color })
            .select('id')
            .single();
          categoryId = newCat?.id;
          // Mise à jour locale immédiate
          if (newCat) allCategories.push({ id: newCat.id, name: row.catName, color_hex: color });
        }
      }

      // 2. Upsert compétence
      const { data: existSkill } = await sb
        .from('skills')
        .select('id')
        .ilike('name', row.skillName)
        .maybeSingle();

      let skillId;
      if (existSkill) {
        skillId = existSkill.id;
      } else {
        const { data: newSkill } = await sb
          .from('skills')
          .insert({ name: row.skillName, category_id: categoryId })
          .select('id')
          .single();
        skillId = newSkill?.id;
        if (newSkill) allSkills.push({ id: newSkill.id, name: row.skillName, category_id: categoryId, declarers_count: 0 });
      }

      // 3. Upsert déclaration
      if (skillId) {
        await sb.from('declarations').upsert(
          { participant: prenom, skill_id: skillId, level: row.level },
          { onConflict: 'participant,skill_id' }
        );
      }
    }

    showFeedback(`Merci ${prenom} ! Vos compétences sont enregistrées. Le nuage se met à jour.`, 'success');
    btn.textContent = 'Enregistré ✓';

    // Reset après 3s
    setTimeout(() => {
      document.getElementById('prenom').value = '';
      document.getElementById('history-panel').style.display = 'none';
      state.forEach((s, i) => {
        s.catId = null; s.catName = ''; s.skillName = ''; s.level = null;
        s._autoFilled = false;
        const si = document.getElementById(`skill-input-${i}`);
        const ci = document.getElementById(`cat-input-${i}`);
        const hi = document.getElementById(`dup-hint-${i}`);
        if (si) { si.value = ''; si.classList.remove('duplicate'); }
        if (ci) { ci.value = ''; ci.classList.remove('auto-filled'); }
        if (hi) hi.classList.remove('visible');
        document.querySelectorAll(`#level-row-${i} .level-btn`).forEach(b => b.classList.remove('selected'));
      });
      btn.disabled = false;
      btn.textContent = 'Enregistrer mes compétences';
      loadLists().then(initPrenomAC); // rafraîchir listes + prénoms
    }, 3000);

  } catch (err) {
    console.error(err);
    showFeedback('Erreur lors de l\'enregistrement. Réessayez.', 'error');
    btn.disabled = false;
    btn.textContent = 'Enregistrer mes compétences';
  }
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

// ── Autocomplete prénom ──────────────────────────────
function initPrenomAC() {
  const input = document.getElementById('prenom');
  const drop  = document.getElementById('prenom-drop');
  let activeIdx = -1;

  function renderDrop(q) {
    const lower = q.toLowerCase().trim();
    const matches = lower
      ? allPrenoms.filter(p => p.toLowerCase().includes(lower))
      : allPrenoms;
    if (!matches.length) { drop.classList.remove('open'); return; }
    activeIdx = -1;
    drop.innerHTML = matches.map((p, i) =>
      `<div class="ac-option" data-idx="${i}" data-name="${p}">${p}</div>`
    ).join('');
    drop.querySelectorAll('.ac-option').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        input.value = el.dataset.name;
        drop.classList.remove('open');
        onPrenomSelect(el.dataset.name);
      });
    });
    drop.classList.add('open');
  }

  input.addEventListener('input', () => renderDrop(input.value));
  input.addEventListener('focus', () => renderDrop(input.value));
  input.addEventListener('blur',  () => setTimeout(() => drop.classList.remove('open'), 150));
  input.addEventListener('keydown', e => {
    const opts = drop.querySelectorAll('.ac-option');
    if (e.key === 'ArrowDown') activeIdx = Math.min(activeIdx+1, opts.length-1);
    else if (e.key === 'ArrowUp') activeIdx = Math.max(activeIdx-1, 0);
    else if (e.key === 'Enter' && activeIdx >= 0) {
      e.preventDefault(); opts[activeIdx].dispatchEvent(new MouseEvent('mousedown'));
    } else if (e.key === 'Escape') drop.classList.remove('open');
    opts.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
  });
  // Si l'utilisateur quitte le champ sans sélectionner, on tente quand même
  input.addEventListener('blur', () => {
    const v = input.value.trim();
    if (v) onPrenomSelect(v);
  });
}

function onPrenomSelect(prenom) {
  const decls = prenomDeclMap[prenom];
  const panel = document.getElementById('history-panel');
  if (!decls || !decls.length) { panel.style.display = 'none'; return; }

  const lvlLabel = n => ['','Découverte','Pratique','Expert'][n] || '';
  const lvlClass = n => ['','hist-lvl-1','hist-lvl-2','hist-lvl-3'][n] || '';

  document.getElementById('history-title').textContent =
    `${prenom} — ${decls.length} compétence${decls.length > 1 ? 's' : ''} déjà saisie${decls.length > 1 ? 's' : ''}`;

  document.getElementById('history-list').innerHTML = decls
    .sort((a, b) => a.cat_name.localeCompare(b.cat_name))
    .map(d => `<div class="hist-item">
      <div class="hist-skill">${d.skill_name}</div>
      <div class="hist-cat">${d.cat_name}</div>
      <div class="hist-lvl ${lvlClass(d.level)}">${'●'.repeat(d.level||0)}${'○'.repeat(3-(d.level||0))} ${lvlLabel(d.level)}</div>
    </div>`).join('');

  panel.style.display = 'block';
  // Vérifier les doublons sur les blocs déjà remplis
  checkAllDuplicates(prenom);
}

// ── Détection doublon ────────────────────────────────
function isDuplicate(prenom, skillId) {
  const decls = prenomDeclMap[prenom] || [];
  return decls.some(d => d.skill_id === skillId);
}

function checkAllDuplicates(prenom) {
  for (let i = 0; i < 5; i++) {
    const s = state[i];
    const skillEl = document.getElementById(`skill-input-${i}`);
    const hintEl  = document.getElementById(`dup-hint-${i}`);
    if (!skillEl || !hintEl) continue;
    const skill = allSkills.find(x => x.name.toLowerCase() === skillEl.value.trim().toLowerCase()
      && (s.catId ? x.category_id === s.catId : true));
    if (skill && isDuplicate(prenom, skill.id)) {
      skillEl.classList.add('duplicate');
      hintEl.classList.add('visible');
    } else {
      skillEl.classList.remove('duplicate');
      hintEl.classList.remove('visible');
    }
  }
}

function checkDuplicate(blockIdx) {
  const prenom = document.getElementById('prenom').value.trim();
  if (!prenom) return;
  const s = state[blockIdx];
  const skillEl = document.getElementById(`skill-input-${blockIdx}`);
  const hintEl  = document.getElementById(`dup-hint-${blockIdx}`);
  const skill = allSkills.find(x =>
    x.name.toLowerCase() === skillEl.value.trim().toLowerCase() &&
    (s.catId ? x.category_id === s.catId : true)
  );
  if (skill && isDuplicate(prenom, skill.id)) {
    skillEl.classList.add('duplicate');
    hintEl.classList.add('visible');
  } else {
    skillEl.classList.remove('duplicate');
    hintEl.classList.remove('visible');
  }
}

// ── Init ──────────────────────────────────────────────
(async () => {
  await loadLists();
  buildBlocks();
  initPrenomAC();
})();
</script>
